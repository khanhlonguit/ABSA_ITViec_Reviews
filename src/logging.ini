# =============================================================================
# logging.ini — Cấu hình logging tập trung cho ABSA_ITViec_Reviews project
# %(logs_dir)s được truyền động bởi log_setup.py → PROJECT_ROOT/logs/
# =============================================================================

[loggers]
keys=root,filter_reviews,check_mask,crawl_reviews

[handlers]
keys=console,filterReviewsFile,checkMaskFile,crawlFile

[formatters]
keys=standard

# ---------------------------------------------------------------------------
# Root logger — chỉ hiện WARNING trở lên ra console
# ---------------------------------------------------------------------------
[logger_root]
level=WARNING
handlers=console

# ---------------------------------------------------------------------------
# Per-script loggers
# ---------------------------------------------------------------------------
[logger_filter_reviews]
level=ERROR
handlers=filterReviewsFile
qualname=filter_reviews
propagate=0

[logger_check_mask]
level=ERROR
handlers=checkMaskFile
qualname=check_mask
propagate=0

[logger_crawl_reviews]
level=INFO
handlers=crawlFile,console
qualname=crawl_reviews
propagate=0

# ---------------------------------------------------------------------------
# Handlers
# ---------------------------------------------------------------------------
[handler_console]
class=StreamHandler
level=INFO
formatter=standard
args=(sys.stdout,)

[handler_filterReviewsFile]
class=FileHandler
level=ERROR
formatter=standard
args=('%(logs_dir)s/filter_reviews_errors.log', 'a', 'utf-8')

[handler_checkMaskFile]
class=FileHandler
level=ERROR
formatter=standard
args=('%(logs_dir)s/check_mask_errors.log', 'a', 'utf-8')

[handler_crawlFile]
class=FileHandler
level=INFO
formatter=standard
args=('%(logs_dir)s/crawl_errors.log', 'a', 'utf-8')

# ---------------------------------------------------------------------------
# Formatter
# ---------------------------------------------------------------------------
[formatter_standard]
format=%(asctime)s [%(levelname)s] %(name)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
